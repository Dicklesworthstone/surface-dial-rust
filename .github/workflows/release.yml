name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
            binary_ext: ""
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
            binary_ext: ""
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            binary_ext: ""
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-aarch64
            binary_ext: ""
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            binary_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libhidapi-dev pkg-config

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/surface-dial${{ matrix.binary_ext }} \
             dist/surface-dial-${{ matrix.name }}${{ matrix.binary_ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: surface-dial-${{ matrix.name }}
          path: dist/surface-dial-${{ matrix.name }}${{ matrix.binary_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"/* release/ || true
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Surface Dial ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release/*
          body: |
            ## Surface Dial Volume Controller ${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | Architecture | Binary |
            |----------|--------------|--------|
            | macOS | Apple Silicon (M1/M2/M3) | `surface-dial-macos-aarch64` |
            | macOS | Intel x64 | `surface-dial-macos-x86_64` |
            | Linux | x64 | `surface-dial-linux-x86_64` |
            | Linux | ARM64 | `surface-dial-linux-aarch64` |
            | Windows | x64 | `surface-dial-windows-x86_64.exe` |

            ### Installation

            ```bash
            # Quick install (auto-detects platform)
            curl -fsSL https://raw.githubusercontent.com/OWNER/surface_dial_rust/main/install.sh | bash

            # Or download binary manually and run install.sh --from-release
            ```

            ### Checksums

            See `checksums.txt` for SHA256 verification.
